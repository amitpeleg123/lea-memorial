<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הקדשות — לאה פלג ז״ל</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a0a0a;
      color: #f0e0d6;
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    .back {
      position: fixed;
      top: 20px;
      right: 24px;
      color: #c47d8a;
      text-decoration: none;
      font-size: .95rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .back:hover { color: #e8b4bc; }

    h1 {
      font-size: 2.4rem;
      color: #e8b4bc;
      text-align: center;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      color: #c47d8a;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 48px;
      font-weight: 300;
    }

    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
    }

    .card {
      width: 150px;
      height: 150px;
      border: 2px solid #7b1e2e;
      border-radius: 14px;
      background: linear-gradient(135deg, #3d0c14, #2a0810);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      color: #f0e0d6;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      box-shadow: 0 4px 20px #00000055;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 36px #7b1e2e55;
      border-color: #c47d8a;
    }

    .card-icon { font-size: 2rem; }

    .card-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e8b4bc;
      text-align: center;
    }

    .card-hint {
      font-size: 0.78rem;
      color: #c47d8a;
      font-weight: 300;
    }

    /* מודל */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000b;
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.open { display: flex; }

    .modal-box {
      background: linear-gradient(135deg, #3d0c14, #2a0810);
      border: 2px solid #7b1e2e;
      border-radius: 14px;
      padding: 40px;
      max-width: 460px;
      width: 100%;
      position: relative;
      box-shadow: 0 8px 40px #00000099;
      text-align: center;
    }

    .modal-name {
      font-size: 2rem;
      color: #e8b4bc;
      font-weight: 900;
      margin-bottom: 20px;
    }

    .modal-ded {
      color: #f0e0d6;
      line-height: 1.9;
      font-size: 1rem;
      font-style: italic;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      left: 14px;
      background: none;
      border: none;
      color: #c47d8a;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .close-btn:hover { color: #e8b4bc; }

    footer {
      position: fixed;
      bottom: 20px;
      color: #5a1e28;
      font-size: .8rem;
    }
  </style>
</head>
<body>

  <a class="back" href="dedications.html">← חזרה לתשבץ</a>

  <h1>💌 הקדשות</h1>
  <p class="subtitle">מכל הלב</p>

  <div class="cards" id="cards"></div>

  <footer>לזכר נשמתה הטהורה ✦</footer>

  <div class="modal" id="modal">
    <div class="modal-box">
      <button class="close-btn" onclick="closeModal()">✕</button>
      <div class="modal-name" id="mname"></div>
      <div class="modal-ded" id="mded"></div>
    </div>
  </div>

  <script>
    const PEOPLE = [
      { name:"עדי",   role:"הבן הגדול",       ded:"ההקדשה של עדי תתווסף כאן..." },
      { name:"קטי",   role:"אשת עדי",          ded:"ההקדשה של קטי תתווסף כאן..." },
      { name:"גד",    role:"הנכד הבכור",       ded:"ההקדשה של גד תתווסף כאן..." },
      { name:"ליהי",  role:"נכדה",             ded:"ההקדשה של ליהי תתווסף כאן..." },
      { name:"ענב",   role:"נכד",              ded:"ההקדשה של ענב תתווסף כאן..." },
      { name:"ערן",   role:"הבן האמצעי",       ded:"ההקדשה של ערן תתווסף כאן..." },
      { name:"ענת",   role:"אשת ערן",          ded:"ההקדשה של ענת תתווסף כאן..." },
      { name:"מעיין", role:"נכדה",             ded:"ההקדשה של מעיין תתווסף כאן..." },
      { name:"אפיק",  role:"נכד",              ded:"ההקדשה של אפיק תתווסף כאן..." },
      { name:"עופר",  role:"הבן הקטן",         ded:"ההקדשה של עופר תתווסף כאן..." },
      { name:"עילית", role:"אשת עופר",         ded:"ההקדשה של עילית תתווסף כאן..." },
      { name:"עילי",  role:"נכד",              ded:"ההקדשה של עילי תתווסף כאן..." },
      { name:"עלמה",  role:"נכדה",             ded:"ההקדשה של עלמה תתווסף כאן..." },
      { name:"עמית",  role:"נכד הזקונים",      ded:"ההקדשה של עמית תתווסף כאן..." },
    ];

    const container = document.getElementById('cards');
    PEOPLE.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="card-icon">💌</span>
        <span class="card-name">${p.name}</span>
        <span class="card-hint">${p.role}</span>
      `;
      card.addEventListener('click', () => openModal(p));
      container.appendChild(card);
    });

    function openModal(p) {
      document.getElementById('mname').textContent = p.name;
      document.getElementById('mded').textContent = p.ded;
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
  </script>

</body>
</html>
