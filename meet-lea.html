<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הכר את לאה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a0a0a;
      color: #f0e0d6;
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .back {
      position: fixed;
      top: 20px;
      right: 24px;
      color: #c47d8a;
      text-decoration: none;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back:hover { color: #e8b4bc; }

    h1 {
      font-size: 2.2rem;
      color: #e8b4bc;
      text-align: center;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      color: #c47d8a;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 56px;
      font-weight: 300;
    }

    .cards {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 200px;
      height: 200px;
      border: 2px solid #7b1e2e;
      border-radius: 14px;
      background: linear-gradient(135deg, #3d0c14, #2a0810);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      color: #f0e0d6;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      box-shadow: 0 4px 20px #00000055;
      position: relative;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 36px #7b1e2e55;
      border-color: #c47d8a;
    }

    .card-num {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 0.75rem;
      color: #7b1e2e;
      font-weight: 700;
    }

    .card-icon { font-size: 2.2rem; }

    .card-text {
      font-size: 1rem;
      text-align: center;
      color: #e8b4bc;
      line-height: 1.5;
      padding: 0 12px;
      font-weight: 400;
    }

    footer {
      position: fixed;
      bottom: 20px;
      color: #5a1e28;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">→ חזרה</a>

  <h1>הכר את לאה</h1>
  <p class="subtitle">בחר איך תרצה להכיר אותה</p>

  <div class="cards">

    <a class="card" href="chat.html">
      <span class="card-num">1</span>
      <span class="card-icon">💬</span>
      <span class="card-text">דרך צ׳אט<br><small style="color:#c47d8a;font-size:0.8rem">שאל שאלות</small></span>
    </a>

    <a class="card" href="crossword.html">
      <span class="card-num">2</span>
      <span class="card-icon">🔤</span>
      <span class="card-text">דרך תשבץ<br><small style="color:#c47d8a;font-size:0.8rem">פתור וגלה סיפורים</small></span>
    </a>

    <a class="card" href="story.html">
      <span class="card-num">3</span>
      <span class="card-icon">📖</span>
      <span class="card-text">סיפור החיים<br><small style="color:#c47d8a;font-size:0.8rem">קרא את הסיפור שלה</small></span>
    </a>

  </div>

  <footer>לזכר נשמתה הטהורה ✦</footer>

</body>
</html>
