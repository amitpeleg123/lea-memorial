<head>
  <meta charset="UTF-8" />

  <title>גלריה — לאה פלג ז"ל</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1a0a0a;
      color: #f0e0d6;
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    .back {
      position: fixed;
      top: 20px;
      right: 24px;
      color: #c47d8a;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      transition: color .2s;
      z-index: 10;
    }
    .back:hover { color: #e8b4bc; }

    h1 {
      font-size: 2.2rem;
      color: #e8b4bc;
      text-align: center;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .subtitle {
      color: #c47d8a;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 960px;
      width: 100%;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    .grid-item {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      border: 1.5px solid #3d0c14;
      aspect-ratio: 1;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }

    .grid-item:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 30px #7b1e2e55;
      border-color: #c47d8a;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .grid-item.video::after {
      content: '▶';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      color: white;
      background: #0008;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    /* lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: #000d;
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .lightbox.open { display: flex; }

    .lightbox img, .lightbox video {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 10px;
      object-fit: contain;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      z-index: 101;
    }

    .lightbox-prev, .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: #0008;
      border: none;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 8px;
      z-index: 101;
    }
    .lightbox-prev { right: 20px; }
    .lightbox-next { left: 20px; }

    footer {
      margin-top: 60px;
      color: #5a1e28;
      font-size: .8rem;
    }
  </style>
</head>

    let currentIndex = 0;
    const grid = document.getElementById('grid');

    const photoGrid = document.getElementById('grid');
    const videoGrid = document.getElementById('grid-videos');

    PHOTOS.forEach((p, i) => {
      const item = document.createElement('div');
      item.className = `grid-item${p.type === 'video' ? ' video' : ''}`;
      item.onclick = () => openLightbox(i);

      if (p.type === 'video') {
        const vid = document.createElement('video');
        vid.src = p.url;
        vid.preload = 'metadata';
        vid.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        item.appendChild(vid);
        videoGrid.appendChild(item);
      } else {
        const img = document.createElement('img');
        img.src = p.url;
        img.alt = '';
        img.onerror = () => { item.style.display = 'none'; };
        item.appendChild(img);
        photoGrid.appendChild(item);
      }
    });

    function openLightbox(index) {
      currentIndex = index;
      const p = PHOTOS[index];
      const content = document.getElementById('lightbox-content');
      if (p.type === 'video') {
        content.innerHTML = `<video controls autoplay src="${p.url}" style="max-width:90vw;max-height:85vh;border-radius:10px;"></video>`;
      } else {
        content.innerHTML = `<img src="${p.url}" alt="" />`;
      }
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightbox-content').innerHTML = '';
    }

    function changePhoto(dir) {
      currentIndex = (currentIndex + dir + PHOTOS.length) % PHOTOS.length;
      openLightbox(currentIndex);
    }

    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') changePhoto(1);
      if (e.key === 'ArrowLeft') changePhoto(-1);
    });
